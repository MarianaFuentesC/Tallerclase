<!DOCTYPE html> 
<html lang="es"> 
    <head>
         <meta charset="UTF-8"> 
         <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Título</title>
          <link rel="stylesheet" href="taller.css">
         </head> 
         <body>


             <script src="taller.js"defer></script> 
             <form id="registro-usuario">
  
  
    <label for="nombreCompleto">Nombre:</label>
     <input type="text" id="nombreCompleto"  name="nombreCompleto" minlength="1" maxlength="50" pattern="[A-Za-záéíóúÁÉÍÓÚñÑ\s]+" required placeholder="Ej: Maria Rodriguez"/> 
  
    <label for="edad">Edad</label>
    <input type="number" id="edad" name="edad" min="1" max="120"placeholder="Ej: 19" required/>
  
    <label for="tipodedocumento">Tipo de Documento</label>
    <select id="tipodedocumento" name="tipodedocumento">
      <option value="RC">Registro civil</option>
      <option value="CC">Cédula de Ciudadanía</option>
      <option value="TI">Tarjeta de Identidad</option>
      <option value="CE">Cédula de Extranjería</option>
    </select>

 
    <label for="numerodedocumento">Número de Documento</label>
    <input type="text" id="numerodedocumento" name="numerodedocumento" minlength="9" maxlength="10" pattern="[0-9]+" required placeholder="Ej: 1033102024"/>


  <label for="salario">Salario:</label>
    <input type="number" id="salario" name="salario" min="0" step="0.01" required placeholder="Ej: 1800000"/>
     <label for="comisiones">Comisiones:</label>
    <input  type="number" id="comisiones" name="comisiones" min="0" step="0.01" value="0" placeholder="Ej: 500000"/>
<label for="horasExtras">Horas Extras:</label>
    <input  type="number" id="horasExtras" name="horasExtras" min="0" step="0.01" value="0" placeholder="Ej: 130000"/>
    <label for="nivelRiesgo">Nivel de Riesgo:</label>
    <select id="nivelRiesgo" name="nivelRiesgo" required>
        <option value="">Seleccione una opción</option>
        <option value="1">Riesgo Mínimo</option>
        <option value="2">Riesgo Bajo</option>
        <option value="3">Riesgo Medio</option>
        <option value="4">Riesgo Alto</option>
        <option value="5">Riesgo Máximo</option>
    </select>
    
    <input type="button" id="button" name="button" value="Enviar">
</form>

            </body> 
            </html>
